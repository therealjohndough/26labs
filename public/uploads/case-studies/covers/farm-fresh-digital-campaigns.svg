<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Farm Fresh Digital Campaigns</title>
  <desc id="desc">Gradient cover art for the Farm Fresh digital campaigns case study.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#101625"/>
      <stop offset="38%" stop-color="#15384a"/>
      <stop offset="100%" stop-color="#1f2c27"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="30%">
      <stop offset="0%" stop-color="#63d6ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#63d6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="18%" r="28%">
      <stop offset="0%" stop-color="#d9ff5c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d9ff5c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.2"/>

  <rect x="1020" y="170" width="300" height="560" rx="28" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.14)" />
  <rect x="1070" y="220" width="200" height="360" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" />
  <text x="1166" y="438" fill="#ffffff" opacity="0.08" font-family="Helvetica, Arial, sans-serif" font-size="210" font-weight="700" text-anchor="middle">FF</text>

  <text x="110" y="125" fill="#63d6ff" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="6">CASE STUDY LABS</text>
  <text x="110" y="390" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="700">Farm Fresh!</text>
  <text x="110" y="490" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="78" font-weight="300">Digital Campaigns</text>
  <text x="110" y="590" fill="#d7dfdb" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="400">Mobile promos, product cards, and digital assets built for engagement.</text>

  <rect x="110" y="690" width="250" height="10" rx="5" fill="#63d6ff"/>
  <text x="110" y="770" fill="#d7dfdb" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400">Campaign creative with sharper conversion paths.</text>
</svg>
