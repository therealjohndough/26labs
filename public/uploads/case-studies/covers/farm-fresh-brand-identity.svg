<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Farm Fresh Brand Identity &amp; Packaging</title>
  <desc id="desc">Gradient cover art for the Farm Fresh brand identity case study.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b3f39"/>
      <stop offset="42%" stop-color="#14564d"/>
      <stop offset="100%" stop-color="#1f2c27"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="32%">
      <stop offset="0%" stop-color="#b8ff5c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b8ff5c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="78%" cy="18%" r="28%">
      <stop offset="0%" stop-color="#ffd65e" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffd65e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow1)"/>
  <rect width="1600" height="900" fill="url(#glow2)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.22"/>

  <text x="1125" y="545" fill="#ffffff" opacity="0.08" font-family="Helvetica, Arial, sans-serif" font-size="320" font-weight="700" letter-spacing="-8">FF</text>

  <text x="110" y="125" fill="#d9ff5c" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="6">CASE STUDY LABS</text>
  <text x="110" y="390" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="92" font-weight="700">Farm Fresh!</text>
  <text x="110" y="490" fill="#ffffff" font-family="Helvetica, Arial, sans-serif" font-size="78" font-weight="300">Brand Identity &amp; Packaging</text>
  <text x="110" y="590" fill="#d7dfdb" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="400">Logo system, packaging, collateral, and digital rollout assets.</text>

  <rect x="110" y="690" width="250" height="10" rx="5" fill="#d9ff5c"/>
  <text x="110" y="770" fill="#d7dfdb" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400">Strategic design that ships.</text>
</svg>
